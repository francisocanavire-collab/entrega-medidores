<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGM - Gestión de Inventario</title>
    <!-- Dependencias externas vía CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --navy: #0D2334; --red: #D70F27; --emerald: #10B981; }
        body { background-color: #F1F5F9; font-family: ui-sans-serif, system-ui, sans-serif; overflow-x: hidden; }
        
        #camera-container { display: none; position: fixed; inset: 0; z-index: 500; background: black; }
        #scanner-container video { width: 100%; height: 100%; object-fit: cover; }
        .scan-region { width: 75%; height: 25%; border: 3px solid white; border-radius: 1.5rem; box-shadow: 0 0 0 4000px rgba(0,0,0,0.7); position: relative; }
        .scan-line { position: absolute; width: 100%; height: 3px; background: var(--red); top: 50%; box-shadow: 0 0 15px var(--red); animation: moveScan 2s infinite ease-in-out; }
        @keyframes moveScan { 0%, 100% { top: 10%; } 50% { top: 90%; } }

        .tab-active { color: var(--navy); border-bottom: 4px solid var(--red); font-weight: 800; }
        .tab-inactive { color: #94A3B8; font-weight: 600; }
        .badge { font-size: 10px; padding: 4px 10px; border-radius: 999px; font-weight: 800; text-transform: uppercase; }
        
        .bg-mono { background-color: #DBEAFE; color: #1E40AF; }
        .bg-trifa { background-color: #FEF3C7; color: #92400E; }
        .bg-limit { background-color: #FEE2E2; color: #991B1B; }
        .bg-indir { background-color: #F3E8FF; color: #6B21A8; }
        .bg-conc { background-color: #D1FAE5; color: #065F46; }

        .loader-ring { border: 3px solid #f3f3f3; border-top: 3px solid var(--red); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-40">

    <header class="bg-[#0D2334] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-md md:max-w-6xl mx-auto px-4 pt-5 pb-2">
            <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                <h1 class="text-xl font-black italic text-red-500">SGM <span class="text-white font-light">Inventory</span></h1>
                <div class="flex gap-2 w-full md:w-auto justify-center">
                    <label class="flex-1 md:flex-none justify-center bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-[10px] font-bold cursor-pointer transition-all flex items-center gap-1">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                        SUBIR BASE
                        <input type="file" id="upload-db" accept=".xlsx, .xls, .csv" class="hidden" onchange="importFromExcel(this)">
                    </label>
                    <button onclick="exportToExcel()" class="flex-1 md:flex-none justify-center bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded-lg text-[10px] font-bold flex items-center gap-1 transition-all">
                        <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11zM12 18l-4-4h2.5v-3h3v3H16l-4 4z"/></svg>
                        BAJAR BASE
                    </button>
                </div>
            </div>
            <nav class="flex justify-between md:justify-center md:gap-12">
                <button onclick="switchTab('entrega')" id="tab-entrega" class="tab-active pb-3 px-2 text-[10px] uppercase">Entrega</button>
                <button onclick="switchTab('devolucion')" id="tab-devolucion" class="tab-inactive pb-3 px-2 text-[10px] uppercase">Devolución</button>
                <button onclick="switchTab('consulta')" id="tab-consulta" class="tab-inactive pb-3 px-2 text-[10px] uppercase">Consulta</button>
                <button onclick="switchTab('historial')" id="tab-historial" class="tab-inactive pb-3 px-2 text-[10px] uppercase">Stock</button>
            </nav>
        </div>
    </header>

    <main class="max-w-md md:max-w-6xl mx-auto p-4 space-y-4">

        <div id="db-empty-alert" class="bg-amber-50 border-2 border-amber-200 p-4 rounded-2xl flex items-center gap-3 animate-pulse max-w-md mx-auto">
            <div class="text-amber-600"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg></div>
            <p class="text-[10px] font-bold text-amber-800 uppercase text-center">Sin base de datos activa. Importe un archivo arriba o empiece a procesar.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
            
            <div class="space-y-4">
                <!-- VISTA ENTREGA -->
                <div id="view-entrega" class="space-y-4">
                    <div class="bg-white rounded-[2rem] p-5 shadow-sm border border-slate-100">
                        <div class="flex justify-between items-center mb-3">
                            <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Responsable</label>
                            <button onclick="clearOpSelection()" id="btn-clear-op" class="hidden text-[9px] font-bold text-slate-400 uppercase border px-3 py-1 rounded-full">Cambiar</button>
                        </div>
                        <div class="relative" id="carnet-input-container">
                            <input type="text" id="input-carnet" placeholder="Nombre o Escanear carnet..." class="w-full bg-slate-100 border-none rounded-[1.5rem] px-6 py-4 font-bold text-lg outline-none focus:ring-2 focus:ring-red-500">
                            <button onclick="startScanner('input-carnet')" class="absolute right-2 top-2 bottom-2 w-12 bg-slate-800 text-white rounded-[1rem] flex items-center justify-center">
                                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M3 7V5a2 2 0 0 1 2-2h2m10 0h2a2 2 0 0 1 2 2v2m0 10v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M8 12h8"/></svg>
                            </button>
                        </div>
                        <div id="selected-op-display" class="mt-2 hidden">
                            <div class="flex items-center gap-3 bg-red-50 p-4 rounded-2xl border border-red-100">
                                <div class="bg-red-500 text-white p-2 rounded-xl"><svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
                                <div class="flex-1">
                                    <p class="text-[9px] font-bold text-red-400 uppercase leading-none">Responsable Actual</p>
                                    <p id="selected-op-name" class="text-[14px] font-black text-red-600 uppercase mt-1"></p>
                                </div>
                                <div id="op-loader" class="hidden"><div class="loader-ring"></div></div>
                            </div>
                        </div>
                    </div>

                    <div id="scan-section-medidores" class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 opacity-30 pointer-events-none transition-all">
                        <div class="flex justify-between items-center mb-4">
                            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Escaneo Entrega</label>
                            <button onclick="openRangeModal()" class="text-[9px] font-bold text-red-600 uppercase border border-red-200 px-3 py-1 rounded-full">Rango</button>
                        </div>
                        <div class="relative">
                            <input type="text" id="input-entrega" inputmode="numeric" placeholder="Escanear medidor..." class="w-full bg-slate-100 border-none rounded-[1.5rem] px-6 py-5 font-mono text-xl outline-none focus:ring-2 focus:ring-red-500">
                            <button onclick="startScanner('input-entrega')" class="absolute right-2 top-2 bottom-2 w-14 bg-[#D70F27] text-white rounded-[1.2rem] flex items-center justify-center">
                                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M3 7V5a2 2 0 0 1 2-2h2m10 0h2a2 2 0 0 1 2 2v2m0 10v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M8 12h8"/></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- VISTA DEVOLUCION -->
                <div id="view-devolucion" class="hidden space-y-4">
                    <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-lg font-black text-[#0D2334] uppercase italic">Devolución a Stock</h2>
                            <!-- Botón de Rango habilitado explícitamente -->
                            <button onclick="openRangeModal()" class="text-[9px] font-bold text-amber-600 uppercase border border-amber-200 px-3 py-1 rounded-full">Rango</button>
                        </div>
                        <div class="relative">
                            <input type="text" id="input-devolucion" inputmode="numeric" placeholder="Escanear Medidor..." class="w-full bg-slate-100 border-none rounded-[1.5rem] px-6 py-5 font-mono text-xl text-center outline-none focus:ring-2 focus:ring-amber-500">
                            <button onclick="startScanner('input-devolucion')" class="absolute right-2 top-2 bottom-2 w-14 bg-amber-500 text-white rounded-[1.2rem] flex items-center justify-center">
                                 <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M3 7V5a2 2 0 0 1 2-2h2m10 0h2a2 2 0 0 1 2 2v2m0 10v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M8 12h8"/></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- VISTA CONSULTA -->
                <div id="view-consulta" class="hidden space-y-4">
                    <div class="bg-white rounded-[2.5rem] p-6 shadow-xl border-t-4 border-blue-500">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 italic">Consulta de Estado</label>
                        <div class="relative">
                            <input type="text" id="input-consulta" placeholder="Serie o Operario..." class="w-full bg-slate-100 border-none rounded-[1.5rem] px-6 py-5 font-mono text-xl outline-none focus:ring-2 focus:ring-blue-500">
                            <button onclick="startScanner('input-consulta')" class="absolute right-2 top-2 bottom-2 w-14 bg-blue-500 text-white rounded-[1.2rem] flex items-center justify-center">
                                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M3 7V5a2 2 0 0 1 2-2h2m10 0h2a2 2 0 0 1 2 2v2m0 10v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M8 12h8"/></svg>
                            </button>
                        </div>
                        <div id="consulta-result" class="mt-6 hidden"></div>
                    </div>
                </div>

                <!-- VISTA STOCK -->
                <div id="view-historial" class="hidden space-y-4">
                     <div class="grid grid-cols-2 gap-3" id="stats-container"></div>
                     <div id="historial-list" class="space-y-3 max-h-[600px] overflow-y-auto pr-2"></div>
                </div>
            </div>

            <!-- TABLA DE COLA -->
            <div id="log-container" class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden h-fit md:sticky md:top-32">
                <div class="bg-slate-50/80 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="text-[10px] font-black text-[#0D2334] uppercase tracking-widest">En Cola</h3>
                    <span id="total-count" class="bg-[#0D2334] text-white text-[10px] px-3 py-1 rounded-full font-black">0</span>
                </div>
                <div class="max-h-[500px] overflow-y-auto">
                    <table class="w-full text-left border-collapse">
                        <tbody id="log-table-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                    <div id="empty-queue-msg" class="p-10 text-center text-slate-300 italic text-sm hidden">No hay medidores en cola</div>
                </div>
            </div>
        </div>
    </main>

    <!-- ACCION FINAL -->
    <div id="footer-actions" class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t border-slate-200 hidden z-40">
        <div class="max-w-md md:max-w-lg mx-auto">
            <button id="btn-save" onclick="confirmTransaction()" class="w-full py-5 rounded-[1.5rem] font-black uppercase text-[11px] tracking-widest shadow-xl text-white">PROCESAR</button>
        </div>
    </div>

    <!-- SCANNER -->
    <div id="camera-container">
        <div id="scanner-container" class="h-full"></div>
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none"><div class="scan-region"><div class="scan-line"></div></div></div>
        <button onclick="stopScanner()" class="absolute bottom-12 left-1/2 -translate-x-1/2 bg-white text-navy px-10 py-4 rounded-full font-black uppercase text-[10px]">Cerrar</button>
    </div>

    <!-- MODAL RANGO -->
    <div id="range-modal" class="fixed inset-0 z-[250] bg-navy/95 backdrop-blur-md p-6 flex items-center justify-center hidden">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl space-y-6">
            <h3 class="text-xl font-black text-navy text-center uppercase italic">Carga por Rango</h3>
            <div class="space-y-4">
                <div class="relative">
                    <input type="text" id="range-start" inputmode="numeric" placeholder="Serie inicial..." class="w-full bg-slate-100 border-none rounded-2xl pl-5 pr-14 py-4 font-mono text-lg outline-none">
                    <button onclick="startScanner('range-start')" class="absolute right-2 top-2 bottom-2 w-10 bg-slate-800 text-white rounded-xl flex items-center justify-center">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 7V5a2 2 0 0 1 2-2h2m10 0h2a2 2 0 0 1 2 2v2m0 10v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M8 12h8"/></svg>
                    </button>
                </div>
                <div class="relative">
                    <input type="text" id="range-end" inputmode="numeric" placeholder="Serie final..." class="w-full bg-slate-100 border-none rounded-2xl pl-5 pr-14 py-4 font-mono text-lg outline-none">
                    <button onclick="startScanner('range-end')" class="absolute right-2 top-2 bottom-2 w-10 bg-slate-800 text-white rounded-xl flex items-center justify-center">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 7V5a2 2 0 0 1 2-2h2m10 0h2a2 2 0 0 1 2 2v2m0 10v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M8 12h8"/></svg>
                    </button>
                </div>
            </div>
            <div class="flex flex-col gap-2">
                <button onclick="processRangeAuto()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black uppercase text-[11px]">Ejecutar Rango</button>
                <button onclick="closeRangeModal()" class="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-black uppercase text-[11px]">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl text-[10px] font-black text-white shadow-2xl transition-all opacity-0 translate-y-10 z-[300] uppercase text-center min-w-[280px]"></div>

    <script>
        const RULES = [
            { id: 'mono_clou', type: 'Monofásico Clou', prefix: '70', len: 8, badge: 'bg-mono' },
            { id: 'mono_nan', type: 'Monofásico Nansen', prefix: '71', len: 8, badge: 'bg-mono' },
            { id: 'trifa_clou', type: 'Trifásico Clou', prefix: '90', len: 8, badge: 'bg-trifa' },
            { id: 'trifa_nan', type: 'Trifásico Nansen', prefix: '91', len: 8, badge: 'bg-trifa' },
            { id: 'limit', type: 'Limitador', prefix: '40', len: 8, badge: 'bg-limit' },
            { id: 'indir_clou', type: 'Indirecto Clou', prefix: '81', len: 8, badge: 'bg-indir' },
            { id: 'indir_nan', type: 'Indirecto Nansen', prefix: '80', len: 8, badge: 'bg-indir' },
            { id: 'conc', type: 'Concentrador', prefix: '60', len: 8, badge: 'bg-conc' },
            { id: 'mono_std', type: 'Monofásico', prefix: '7', len: 7, badge: 'bg-mono' },
            { id: 'trifa_std', type: 'Trifásico', prefix: '9', len: 7, badge: 'bg-trifa' }
        ];

        const OPERARIOS_LIST = { "OP001": "VEGA RAMON CORSINO", "OP002": "GARCIA JUAN", "OP003": "LOPEZ MARIA" };

        let inventoryDatabase = {}; 
        let currentTab = 'entrega', selectedResponsible = null, queueLog = [], activeInputId = null;
        let scanTimeout = null;

        window.onload = () => { setupInputs(); loadLocalDB(); };

        function setupInputs() {
            // Carnet / Responsable
            document.getElementById('input-carnet').addEventListener('input', (e) => {
                const val = e.target.value.trim().toUpperCase();
                if (val.length >= 3) {
                    const nombreFinal = OPERARIOS_LIST[val] || val;
                    if (OPERARIOS_LIST[val]) {
                        selectResponsible(nombreFinal);
                        e.target.value = '';
                    } else if (val.length > 8) { // Suposición de nombre manual largo
                        selectResponsible(val);
                        e.target.value = '';
                    }
                }
            });

            // Entregas y Devoluciones manuales
            ['input-entrega', 'input-devolucion'].forEach(id => {
                document.getElementById(id).addEventListener('input', (e) => {
                    const val = e.target.value.trim();
                    if (scanTimeout) clearTimeout(scanTimeout);
                    if (val.length >= 7) {
                        scanTimeout = setTimeout(() => {
                            const rule = findExactRule(val);
                            if (rule && val.length === rule.len) {
                                addToQueue(val, rule); e.target.value = '';
                            }
                        }, 100);
                    }
                });
            });

            // Lógica de Rango con Salto Automático
            ['range-start', 'range-end'].forEach(id => {
                document.getElementById(id).addEventListener('input', (e) => {
                    const val = e.target.value.trim();
                    const rule = findExactRule(val);
                    if (rule && val.length === rule.len) {
                        if (id === 'range-start') {
                            document.getElementById('range-end').focus();
                        } else {
                            const startVal = document.getElementById('range-start').value.trim();
                            if (findExactRule(startVal)) {
                                setTimeout(() => processRangeAuto(), 200);
                            }
                        }
                    }
                });
            });

            // Consulta
            document.getElementById('input-consulta').addEventListener('input', (e) => {
                const val = e.target.value.trim().toUpperCase();
                if (val.length >= 3) performConsulta(val);
                else document.getElementById('consulta-result').classList.add('hidden');
            });
        }

        function findExactRule(code) {
            if(!code) return null;
            const r8 = RULES.find(r => r.len === 8 && code.startsWith(r.prefix));
            if (r8 && code.length === 8) return r8;
            const r7 = RULES.find(r => r.len === 7 && code.startsWith(r.prefix));
            if (r7 && code.length === 7) return r7;
            return null;
        }

        function addToQueue(code, rule) {
            if (queueLog.some(i => i.serie === code)) return;
            const existing = inventoryDatabase[code];
            if (currentTab === 'entrega') {
                if (existing && existing.opName !== 'STOCK') {
                    showAlert(`Error: Medidor ya asignado a ${existing.opName}`, "error"); return;
                }
            } else {
                if (existing && existing.opName === 'STOCK') {
                    showAlert("Aviso: Medidor ya se encuentra en Stock", "error"); return;
                }
            }
            queueLog.unshift({ 
                serie: code, tipo: rule.type, badge: rule.badge, 
                opName: currentTab === 'entrega' ? selectedResponsible : 'STOCK' 
            });
            renderTable();
        }

        function confirmTransaction() {
            const date = new Date().toLocaleString('es-AR');
            queueLog.forEach(item => { inventoryDatabase[item.serie] = { ...item, ultima_fecha: date }; });
            saveLocalDB(); queueLog = []; renderTable(); showAlert("Procesado con éxito", "success");
            if (currentTab === 'historial') renderHistorial();
        }

        function switchTab(tab) {
            currentTab = tab;
            ['entrega', 'devolucion', 'consulta', 'historial'].forEach(v => {
                document.getElementById(`view-${v}`).classList.toggle('hidden', v !== tab);
                document.getElementById(`tab-${v}`).className = v === tab ? 'tab-active pb-3 px-2 text-[10px] uppercase' : 'tab-inactive pb-3 px-2 text-[10px] uppercase';
            });
            document.getElementById('log-container').classList.toggle('hidden', tab === 'consulta' || tab === 'historial');
            if(tab === 'historial') renderHistorial();
            renderTable();
        }

        function selectResponsible(name) {
            selectedResponsible = name;
            document.getElementById('selected-op-display').classList.remove('hidden');
            document.getElementById('selected-op-name').innerText = name;
            document.getElementById('carnet-input-container').classList.add('hidden');
            document.getElementById('btn-clear-op').classList.remove('hidden');
            document.getElementById('scan-section-medidores').classList.remove('opacity-30', 'pointer-events-none');
            document.getElementById('input-entrega').focus();
        }

        function clearOpSelection() {
            selectedResponsible = null;
            document.getElementById('selected-op-display').classList.add('hidden');
            document.getElementById('carnet-input-container').classList.remove('hidden');
            document.getElementById('btn-clear-op').classList.add('hidden');
            document.getElementById('scan-section-medidores').classList.add('opacity-30', 'pointer-events-none');
            document.getElementById('input-carnet').focus();
        }

        function openRangeModal() { 
            document.getElementById('range-start').value = ''; 
            document.getElementById('range-end').value = ''; 
            document.getElementById('range-modal').classList.remove('hidden');
            document.getElementById('range-start').focus();
        }
        function closeRangeModal() { document.getElementById('range-modal').classList.add('hidden'); }

        function processRangeAuto() {
            const startStr = document.getElementById('range-start').value.trim();
            const endStr = document.getElementById('range-end').value.trim();
            const start = parseInt(startStr); const end = parseInt(endStr);
            const ruleS = findExactRule(startStr); const ruleE = findExactRule(endStr);

            if (!start || !end || !ruleS || !ruleE || ruleS.prefix !== ruleE.prefix) {
                showAlert("Rango inválido o tipos diferentes", "error"); return;
            }
            if (start > end) { showAlert("Serie inicial mayor a final", "error"); return; }

            for (let i = start; i <= end; i++) {
                addToQueue(i.toString().padStart(ruleS.len, '0'), ruleS);
            }
            closeRangeModal();
        }

        function importFromExcel(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                data.forEach(row => {
                    const serie = (row.Serie || row.SERIE || row.Medidor || "").toString();
                    if (!serie) return;
                    const rule = findExactRule(serie) || { type: 'Externo', badge: 'bg-slate-400' };
                    inventoryDatabase[serie] = {
                        serie, tipo: row.Tipo || rule.type, badge: rule.badge || 'bg-slate-400',
                        opName: row.Responsable || row.Nombre || 'STOCK',
                        ultima_fecha: row.Fecha || '-'
                    };
                });
                saveLocalDB(); renderHistorial(); showAlert("Base importada", "success");
                document.getElementById('db-empty-alert').classList.add('hidden');
            };
            reader.readAsArrayBuffer(file);
        }

        function exportToExcel() {
            const data = Object.values(inventoryDatabase).map(i => ({ 
                Serie: i.serie, Tipo: i.tipo, Responsable: i.opName, Fecha: i.ultima_fecha 
            }));
            if (!data.length) return showAlert("Sin datos", "error");
            const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventario");
            XLSX.writeFile(wb, "Inventario_SGM.xlsx");
        }

        function performConsulta(val) {
            const resDiv = document.getElementById('consulta-result');
            resDiv.classList.remove('hidden');
            const opMatch = Object.values(inventoryDatabase).filter(i => i.opName.includes(val));
            const itemMatch = inventoryDatabase[val];

            if (opMatch.length > 0 && !itemMatch) {
                resDiv.innerHTML = `<div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                    <p class="text-[10px] font-black text-blue-400 mb-2 uppercase">Resultados por Operario</p>
                    <p class="font-bold text-slate-700">${val}: ${opMatch.length} medidores</p>
                </div>`;
            } else if (itemMatch) {
                const isStock = itemMatch.opName === 'STOCK';
                resDiv.innerHTML = `<div class="p-4 rounded-2xl border ${isStock ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'}">
                    <p class="text-xl font-black">${itemMatch.serie}</p>
                    <p class="text-[10px] font-bold uppercase text-slate-500">${itemMatch.tipo} • ${itemMatch.opName}</p>
                </div>`;
            } else {
                resDiv.innerHTML = `<p class="text-center text-slate-400 text-xs py-4 italic">No se encontraron resultados</p>`;
            }
        }

        function renderTable() {
            const count = queueLog.length;
            document.getElementById('total-count').innerText = count;
            document.getElementById('footer-actions').classList.toggle('hidden', count === 0);
            document.getElementById('empty-queue-msg').classList.toggle('hidden', count !== 0);
            const btn = document.getElementById('btn-save');
            const isEntrega = count > 0 && queueLog[0].opName !== 'STOCK';
            btn.className = `w-full py-5 rounded-[1.5rem] font-black uppercase text-[11px] tracking-widest shadow-xl text-white ${isEntrega ? 'bg-red-600' : 'bg-amber-500'}`;
            btn.innerText = `CONFIRMAR (${count})`;
            document.getElementById('log-table-body').innerHTML = queueLog.map((item, idx) => `<tr><td class="px-6 py-4 font-mono font-black">${item.serie}</td><td class="px-6 py-4"><span class="badge ${item.badge}">${item.tipo}</span></td><td class="px-6 py-4 text-right"><button onclick="removeFromQueue(${idx})" class="text-slate-300">✕</button></td></tr>`).join('');
        }

        function renderHistorial() {
            const items = Object.values(inventoryDatabase);
            const stats = items.reduce((acc, i) => { acc[i.opName === 'STOCK' ? 'stock' : 'calle']++; return acc; }, {stock:0, calle:0});
            document.getElementById('stats-container').innerHTML = `
                <div class="bg-white p-4 rounded-3xl border"><p class="text-[9px] font-black text-slate-400 uppercase">En Stock</p><h5 class="text-xl font-black text-emerald-500">${stats.stock}</h5></div>
                <div class="bg-white p-4 rounded-3xl border"><p class="text-[9px] font-black text-slate-400 uppercase">En Calle</p><h5 class="text-xl font-black text-red-500">${stats.calle}</h5></div>`;
            document.getElementById('historial-list').innerHTML = items.sort((a,b) => b.serie.localeCompare(a.serie)).map(i => `
                <div class="bg-white p-3 rounded-2xl border flex justify-between items-center shadow-sm">
                    <div><p class="text-[11px] font-black">${i.serie}</p><p class="text-[8px] font-bold text-slate-400 uppercase">${i.opName}</p></div>
                    <span class="badge ${i.badge}">${i.tipo}</span>
                </div>`).join('');
        }

        function removeFromQueue(idx) { queueLog.splice(idx, 1); renderTable(); }
        function saveLocalDB() { localStorage.setItem('sgm_db_master', JSON.stringify(inventoryDatabase)); }
        function loadLocalDB() { 
            const saved = localStorage.getItem('sgm_db_master'); 
            if(saved) { inventoryDatabase = JSON.parse(saved); document.getElementById('db-empty-alert').classList.add('hidden'); }
        }
        function startScanner(tid) { activeInputId = tid; document.getElementById('camera-container').style.display = 'block'; Quagga.init({ inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#scanner-container'), constraints: { facingMode: "environment" } }, decoder: { readers: ["code_128_reader", "ean_reader"] } }, (err) => { if (!err) Quagga.start(); }); Quagga.onDetected((d) => { document.getElementById(activeInputId).value = d.codeResult.code; stopScanner(); document.getElementById(activeInputId).dispatchEvent(new Event('input')); }); }
        function stopScanner() { Quagga.stop(); document.getElementById('camera-container').style.display = 'none'; }
        function showAlert(msg, type) {
            const t = document.getElementById('toast'); t.innerHTML = msg.replace(/\n/g, '<br>');
            t.className = `fixed bottom-24 left-1/2 -translate-x-1/2 px-8 py-5 rounded-3xl text-[10px] font-black text-white shadow-2xl transition-all opacity-100 z-[300] uppercase text-center min-w-[280px] ${type === 'success' ? 'bg-emerald-500' : 'bg-red-600'}`;
            setTimeout(() => { t.className = t.className.replace('opacity-100', 'opacity-0 translate-y-10'); }, 3000);
        }
    </script>
</body>
</html>
